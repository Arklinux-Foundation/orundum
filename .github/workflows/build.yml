name: Build Orundum Container
run-name: "Orundum ${{ github.sha }}"

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ark, ark-nvidia, ark-zen, ark-zen-nvidia, ark-lts, ark-lts-nvidia, ark-hardened, ark-hardened-nvidia]
    steps:
      - uses: actions/checkout@v6

      - name: Set dynamic run name
        run: |
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -sS -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "{\"name\":\"Orundum $SHA7 $(date -u '+%Y-%m-%d %H:%M:%S UTC')\"}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Set lowercase registry
        id: registry
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy GHCR auth for podman (root)
        run: |
          sudo mkdir -p /root/.docker
          sudo cp ~/.docker/config.json /root/.docker/config.json

      - name: Build image
        run: |
          sudo podman build \
            --squash-all \
            --build-arg VARIANT=${{ matrix.variant }} \
            -t ${{ steps.registry.outputs.image }}:${{ matrix.variant }} \
            -f .github/Containerfile \
            .

      - name: Push image
        run: |
          sudo podman push \
            --compression-format zstd:chunked \
            ${{ steps.registry.outputs.image }}:${{ matrix.variant }}
